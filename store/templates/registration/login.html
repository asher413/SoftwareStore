{% extends 'store/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="software-card p-5 mt-5">
            <h2 class="text-orange text-center mb-4">כניסה למערכת</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-tech w-100 py-2 mt-3">התחבר עכשיו</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'signup' %}" class="text-white-50 small text-decoration-none">עוד לא רשום? צור חשבון חדש</a>
            </div>
        </div>
    </div>
</div>

<style>
    /* עיצוב השדות שהטופס של דג'נגו מייצר */
    form p input {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid #444;
        color: white;
        padding: 10px;
        border-radius: 5px;
    }
</style>
{% endblock %}
